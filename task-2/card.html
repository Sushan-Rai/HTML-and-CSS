<!DOCTYPE html>
<html lang="en">
<!-- Card element CSS -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Carlos Sainz Card</title>
</head>

<body>
    <h2>CSS Card</h2>
    <!-- this is the card element -->
    <div class="card">
        <!-- this is the image -->
        <img src="carlos.jpg">
        <!-- this is the description -->
        <div class="description">
            <h3><b>Carlos Sainz</b></h3>
            <p>Carlos Sainz Jr. is a highly skilled Spanish Formula One driver known for his
                consistency, technical feedback, and racecraft. After successful stints at Toro Rosso, Renault, McLaren,
                and a standout four-year period at Ferrari, he joined Williams for 2025.</p>
        </div>
    </div>
</body>

</html>
