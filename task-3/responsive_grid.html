<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <!-- Here we create a responsive grid layout using F1 teams -->
    <title>Responsive Grid Layout</title>
</head>
<body>
    <h1 class="title">F1 Teams</h1>
    <!-- f1 teams grid layout 3x2 for desktop devices -->
    <div class="f1-teams">
        <section>
            <img src="./assets/mercedes.png">
            <h2>Mercedes AMG Petronas F1 Team</h2>
        </section>
        <section>
            <img src="./assets/ferrari.jpg">
            <h2>Scuderia Ferrari</h2>
        </section>
        <section>
            <img src="./assets/mclaren.png">
            <h2>McLaren Mastercard Formula 1 Team</h2>
        </section>
        <section>
            <img src="./assets/redbull.png">
            <h2>Red Bull Racing</h2>
        </section>
        <section>
            <img src="./assets/williams.png">
            <h2>Atlassian Williams F1 Team</h2>
        </section>
        <section>
            <img src="./assets/audi.png">
            <h2>Audi F1 Team</h2>
        </section>
    </div>
</body>
</html>
