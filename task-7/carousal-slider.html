<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>F1 Teams Carousal Slider</title>
    <!-- This is a F1 team carousal slider -->
</head>
<body>
    <!-- here is the image container which is centered -->
    <div class="image-container">
        <!-- radio buttons are introduced for moving left or right -->
        <input type="radio" id="left" name="f1-team" value="left" checked>
        <label for="left">left</label>
        <input type="radio" id="right" name="f1-team" value="right">
        <label for="right">right</label><br>
        <!-- this is the slider contains all the images -->
        <div class="slider">
            <img src="./assets/audi.png">
            <img src="./assets/ferrari.jpg">
            <img src="./assets/mclaren.png">
            <img src="./assets/mercedes.png">
            <img src="./assets/redbull.png">
            <img src="./assets/williams.png">
        </div>
    </div>
</body>
</html>
